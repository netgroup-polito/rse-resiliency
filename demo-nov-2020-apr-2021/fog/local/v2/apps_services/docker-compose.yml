     volumes:
      #- /home/testing/Desktop/new_deploy/apps_services/scriptsH:/docker-entrypoint-initdb.d:ro
      - /home/testing/Desktop/new_deploy/apps_services/databaseH:/var/lib/mysql
      - sharedVolumeSocketH:/var/run/mysqld

   dbH:
     image: milozappulla/db_wait_localhost 
     container_name: dbH
     network_mode: service:pdcH
     environment:
       - TERM=xterm
     volumes:
      - sharedVolumeSocketH:/var/run/mysqld
     depends_on:
