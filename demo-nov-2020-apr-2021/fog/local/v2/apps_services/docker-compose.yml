     command: sh -c "/wait"
     environment:
      - WAIT_HOSTS=localhost:3306
      - WAIT_HOSTS_TIMEOUT=300
      - WAIT_SLEEP_INTERVAL=15
      - WAIT_HOST_CONNECT_TIMEOUT=15        

       
networks:    
   net:
     ipam:  
       config:      
          - subnet: 172.33.0.0/16  #USED TO DISPLAY PDC
   net1:
     ipam:  
       config:      
          - subnet: 172.30.0.0/16  #USED TO DISPLAY PMU1
   net2:
     ipam:  
       config:      
          - subnet: 172.31.0.0/16  #USED TO DISPLAY PMU2
   net3:
     ipam:  
       config:      
          - subnet: 172.32.0.0/16  #USED TO DISPLAY PMU3
   net4:
     ipam:  
       config:     
          - subnet: 172.34.0.0/16  #USED TO DISPLAY PDC_H
   pdcH_net:
     ipam:  
       config:      
          - subnet: 172.24.0.0/16  #PDC_H NETWORK
   pdc_net:
     ipam:  
       config:      
          - subnet: 172.23.0.0/16  #PDC NETWORK
   pmu_net1:
     ipam:  
       config:      
          - subnet: 172.20.0.0/16  #PMU1 NETWORK
   pmu_net2:
     ipam:  
       config:      
          - subnet: 172.21.0.0/16  #PMU2 NETWORK
   pmu_net3:
     ipam:  
       config:      
          - subnet: 172.22.0.0/16  #PMU3 NETWORK
   

volumes:
  sharedVolumePDC: {}
  sharedVolumePDC_H: {}
  sharedVolumePMU1: {}
  sharedVolumePMU2: {}
  sharedVolumePMU3: {}
  sharedVolumeSocket: {}
  sharedVolumeSocketH: {}
  
  
