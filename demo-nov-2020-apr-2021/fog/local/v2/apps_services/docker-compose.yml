version: '3'

# START FIRST GROUP TO DISPLAY PDC
services:
   vnc:
     image: vnc
     container_name: vnc
     networks:      
      net:
         ipv4_address: 172.33.0.2
   
   sockify:
     image: sockify
     container_name: sockify
     network_mode: service:vnc
   
   tiger:
     image: tiger
     container_name: tiger
     network_mode: service:vnc
     volumes:
      - sharedVolumePDC:/tmp
      
   pdc:
     image: milozappulla/pdc_sed
     container_name: pdc
     environment:
       - TERM=xterm
     networks:
       pdc_net:                
         ipv4_address: 172.23.0.2
     volumes:
       - sharedVolumePDC:/tmp
       - /home/testing/Desktop/new_deploy/apps_services/config:/home/crownlabs/iPDC
     ports:
       - 14000:14000
     depends_on:
     - tiger
 
   mysql:
     image: milozappulla/mysql:custom
     container_name: mysql
     network_mode: service:pdc
     environment:
      - MYSQL_ROOT_PASSWORD=rootpass
     volumes:
      #- /home/testing/Desktop/new_deploy/apps_services/scripts:/docker-entrypoint-initdb.d:ro
      - /home/testing/Desktop/new_deploy/apps_services/database:/var/lib/mysql
      - sharedVolumeSocket:/var/run/mysqld
     
   db:
     image: milozappulla/db_wait_localhost
     container_name: db
     network_mode: service:pdc
     environment:
       - TERM=xterm
     volumes:
      - sharedVolumeSocket:/var/run/mysqld
     depends_on:
      - mysql
     command: sh -c "/wait"
     environment:
      - WAIT_HOSTS=localhost:3306
      - WAIT_HOSTS_TIMEOUT=300
      - WAIT_SLEEP_INTERVAL=15
      - WAIT_HOST_CONNECT_TIMEOUT=15      


